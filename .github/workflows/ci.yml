name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          # pyproject.toml requires-python = ">=3.11"
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      # test_graph_integration.py needs live Neo4j; test_integration_inference.py
      # needs a live Ollama server. Neither is available on hosted runners.
      - name: Run pytest
        run: uv run pytest -q --ignore=tests/test_graph_integration.py --ignore=tests/test_integration_inference.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Wire-contract tests
        run: npx vitest run

      - name: Build
        run: npm run build
